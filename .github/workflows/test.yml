name: Test
on:
  workflow_dispatch:

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Run script
        id: run_script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          export DEBUG=true
          printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py

      - name: Send Telegram notification
        if: false
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRIPT_RESULT: ${{ steps.run_script.outcome }}
        run: |
          if [ "$SCRIPT_RESULT" = "success" ]; then
            uv run python src/zotero_arxiv_daily/telegram_sender.py
          else
            TODAY=$(date -u +"%Y-%m-%d")
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              --data-urlencode "text=❌ <b>ArXiv Test ${TODAY}</b> 脚本执行失败，请查看 Actions 日志。"
          fi

      - name: Send Feishu notification
        if: always()
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_OPEN_ID: ${{ secrets.FEISHU_OPEN_ID }}
          SCRIPT_RESULT: ${{ steps.run_script.outcome }}
        run: |
          if [ "$SCRIPT_RESULT" = "success" ]; then
            uv run python src/zotero_arxiv_daily/feishu_sender.py
          else
            TODAY=$(date -u +"%Y-%m-%d")
            TOKEN=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
              -H "Content-Type: application/json" \
              -d "{\"app_id\":\"${FEISHU_APP_ID}\",\"app_secret\":\"${FEISHU_APP_SECRET}\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)['tenant_access_token'])")
            curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"receive_id\":\"${FEISHU_OPEN_ID}\",\"msg_type\":\"text\",\"content\":\"{\\\"text\\\":\\\"❌ ArXiv 日报 ${TODAY} 脚本执行失败，请查看 Actions 日志。\\\"}\"}"
